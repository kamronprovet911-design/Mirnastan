<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Империя Мирнастан</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: linear-gradient(135deg, #07111f, #15304f); color: #f6f8fb; min-height: 100vh; }
      .card, .navbar { border: 0; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
      .hero { background: rgba(255,255,255,.08); border-radius: 24px; padding: 2rem; }
      .nav-link { color: #dce9ff !important; }
      .btn-gold { background: #f2b84b; color: #111; font-weight: 600; }
      .btn-gold:hover { background: #ffc969; color: #111; }
      .table-dark-custom { background: rgba(255,255,255,.06); }
    </style>
  </head>
  <body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(0,0,0,.25);">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Мирнастан</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          {% if session.user %}
          <li class="nav-item"><a class="nav-link" href="/dashboard">Панель</a></li>
          <li class="nav-item"><a class="nav-link" href="/submit_report">Новый отчёт</a></li>
          <li class="nav-item"><a class="nav-link" href="/reports">Архив</a></li>
          <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
          {% else %}
          <li class="nav-item"><a class="nav-link" href="/register">Регистрация</a></li>
          <li class="nav-item"><a class="nav-link" href="/login">Войти</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  </body>
</html>
