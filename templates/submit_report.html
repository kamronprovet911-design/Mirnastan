{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card p-4">
      <h3 class="mb-3">Подать заявку на проект</h3>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Королевство</label>
            <select name="kingdom" class="form-select">
              {% for k in kingdoms %}
              <option value="{{ k.name }}" {% if (report_defaults.kingdom or user_kingdom)==k.name %}selected{% endif %}>{{ k.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">От кого</label>
            <input name="author_name" class="form-control" value="{{ report_defaults.author_name or '' }}" placeholder="Имя или должность">
          </div>
          <div class="col-12">
            <label class="form-label">Название проекта</label>
            <input name="title" class="form-control" placeholder="Например: Строительство дороги" required>
          </div>
          <div class="col-12">
            <label class="form-label">Сумма проекта</label>
            <input name="amount" type="number" class="form-control" placeholder="0" required>
          </div>
        </div>
        <button class="btn btn-gold mt-3">Отправить заявку</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
